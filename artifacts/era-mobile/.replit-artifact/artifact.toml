kind = "mobile"
previewPath = "/era-mobile/"
title = "ERA AI Assistant (Mobile)"
version = "1.0.0"
id = "artifacts/era-mobile"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/era-mobile/" ]
localPort = 24684

[services.development]
run = "pnpm --filter @workspace/era-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/era-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/era-mobile", "run", "serve" ]

[services.env]
PORT = "24684"
BASE_PATH = "/era-mobile/"
